<!doctype html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
        Registro de Erros
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />

</head>

<body class="d-flex align-items-center justify-content-center">

    <div class="card-custom w-100" style="max-width: 950px">

        <h1 class="title text-center">
            Registro de Erros - Onboarding
        </h1>

        <form method="POST" id="formRegistro">

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Site
                    </label>

                    <select name="site" class="form-select" required>

                        <option value="">
                            Selecione
                        </option>

                        <option value="ION">
                            ION
                        </option>

                        <option value="Citta">
                            Citta
                        </option>

                        <option value="EG">
                            EG
                        </option>

                    </select>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Número do Chamado
                    </label>

                    <input type="text" name="numero" class="form-control" required />

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Data
                    </label>

                    <input type="date" name="data" class="form-control" required />

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Origem
                    </label>

                    <select name="origem" class="form-select" required>

                        <option value="">
                            Selecione
                        </option>

                        <option value="Onboarding">
                            Onboarding
                        </option>

                        <option value="SuperOnboarding">
                            SuperOnboarding
                        </option>

                        <option value="Ambientação">
                            Ambientação
                        </option>

                        <option value="Smart Locker">
                            Smart Locker
                        </option>

                    </select>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Etapa
                    </label>

                    <select name="etapa" class="form-select" required>

                        <option value="">
                            Selecione
                        </option>

                        <option value="Preparação">
                            Preparação
                        </option>

                        <option value="Atendimento">
                            Atendimento
                        </option>

                        <option value="Agendamento">
                            Agendamento
                        </option>

                        <option value="Entrega">
                            Entrega
                        </option>

                    </select>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Área Responsável
                    </label>

                    <select name="area_responsavel" class="form-select" required>

                        <option value="">
                            Selecione
                        </option>

                        <option value="SOC">
                            SOC
                        </option>

                        <option value="Gestão de Acessos">
                            Gestão de Acessos
                        </option>

                        <option value="RH">
                            RH
                        </option>

                        <option value="Estoque">
                            Estoque
                        </option>

                        <option value="Redes">
                            Redes
                        </option>

                    </select>

                </div>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Desvio identificado
                </label>

                <select name="desvio_identificado" id="desvio_identificado" class="form-select mb-3">

                    <option value="">
                        Selecione um erro
                    </option>
                    
                    <option value="Equipamento avariado">
                        Equipamento avariado
                    </option>

                    <option value="Divergência patrimonial">
                        Divergência patrimonial
                    </option>
                    
                    <option value="SLA reduzido">
                        SLA reduzido
                    </option>

                    <option value="Rede limitada">
                        Rede limitada
                    </option>

                    <option value="Espaço Físico limitado">
                        Espaço Físico limitado
                    </option>

                    <option value="Sem acesso ao E-mail">
                        Sem acesso ao E-mail
                    </option>

                    <option value="Erro de Senha">
                        Erro de Senha
                    </option>

                    <option value="Reagendamento operacional">
                        Reagendamento operacional
                    </option>

                    <option value="Falha provisionamento">
                        Falha provisionamento
                    </option>

                    <option value="Fila divergente">
                        Fila divergente
                    </option>                

                    <option value="Descumprimento agendamento">
                        Descumprimento agendamento
                    </option>

                    <option value="Falha automação">
                        Falha automação
                    </option>

                    {% for erro in erros %}

                    <option value="{{ erro[0] }}">
                        {{ erro[0] }}
                    </option>

                    {% endfor %}

                </select>

                <input type="text" name="novo_erro" id="novo_erro" class="form-control"
                    placeholder="Caso o erro não exista, digite um novo" />

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Motivo
                </label>

                <textarea name="motivo" class="form-control" rows="4" required></textarea>

            </div>

            <div class="d-flex gap-3 flex-wrap mb-4">

                <button type="submit" class="btn btn-custom btn-primary-custom">
                    Salvar
                </button>

                <a href="/relatorio" class="btn btn-custom btn-dark-custom">
                    Exibir Relatório
                </a>

                <a href="/export" class="btn btn-custom btn-success-custom">
                    Gerar Excel
                </a>

            </div>

        </form>

        <hr class="mb-4">

        <h4 class="mb-3 text-white">
            Importar Planilha Excel
        </h4>

        <form action="/importar" method="POST" enctype="multipart/form-data"
            class="d-flex flex-wrap gap-3 align-items-center">

            <input type="file" name="arquivo" accept=".xlsx" class="form-control" style="max-width: 400px" required>

            <button type="submit" class="btn btn-custom btn-success-custom">
                Importar Excel
            </button>

        </form>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>

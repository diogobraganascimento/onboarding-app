<!-- templates/relatorio.html -->

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Relatório de Erros
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        html,
        body {

            height: 100%;

            overflow: hidden;

            background: #0f172a;

            font-family: 'Inter', sans-serif;
        }

        .page-container {

            height: 100vh;

            overflow: hidden;

            padding: 15px;
        }

        .card-custom {

            background: #111827;

            border-radius: 20px;

            padding: 20px;

            height: 100%;

            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
        }

        .title {

            color: #ffffff;

            font-size: 24px;

            font-weight: 700;
        }

        .table-container {

            height: calc(100vh - 260px);

            overflow: hidden;
        }

        table {

            font-size: 13px;
        }

        thead {

            background: #1f2937;

            color: #ffffff;
        }

        tbody {

            color: #ffffff;
        }

        .filtros-container {

            display: flex;

            justify-content: center;

            align-items: center;

            flex-wrap: wrap;

            gap: 10px;

            margin-bottom: 20px;
        }

        .filtro-select {

            width: 180px;

            background: #1f2937;

            border: 1px solid #374151;

            color: #ffffff;
        }

        .graficos-container {

            display: flex;

            flex-direction: column;

            gap: 15px;

            height: 100%;
        }

        .grafico-box {

            height: 48%;
        }

        canvas {

            max-height: 300px !important;
        }

        @media (max-width: 992px) {

            body {

                overflow-y: auto;
            }

            .page-container {

                height: auto;
            }

            .table-container {

                height: auto;
            }

            .grafico-box {

                height: auto;
            }
        }

    </style>

</head>

<body>

    <div class="container-fluid page-container">

        <div class="row g-3 h-100">

            <div class="col-lg-8">

                <div class="card-custom">

                    <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">

                        <h2 class="title">
                            Relatório de Erros
                        </h2>

                        <a
                            href="/"
                            class="btn btn-dark"
                        >
                            Voltar
                        </a>

                    </div>

                    <form
                        method="GET"
                        id="filtroForm"
                        class="filtros-container"
                    >

                        <select
                                    name="mes"
                                    class="form-select filtro-select"
                                    onchange="this.form.submit()"
                                >

                                    <option value="">
                                        Todos os meses
                                    </option>

                                    <option value="01" {% if mes == '01' %}selected{% endif %}>
                                        Janeiro
                                    </option>

                                    <option value="02" {% if mes == '02' %}selected{% endif %}>
                                        Fevereiro
                                    </option>

                                    <option value="03" {% if mes == '03' %}selected{% endif %}>
                                        Março
                                    </option>

                                    <option value="04" {% if mes == '04' %}selected{% endif %}>
                                        Abril
                                    </option>

                                    <option value="05" {% if mes == '05' %}selected{% endif %}>
                                        Maio
                                    </option>

                                    <option value="06" {% if mes == '06' %}selected{% endif %}>
                                        Junho
                                    </option>

                                    <option value="07" {% if mes == '07' %}selected{% endif %}>
                                        Julho
                                    </option>

                                    <option value="08" {% if mes == '08' %}selected{% endif %}>
                                        Agosto
                                    </option>

                                    <option value="09" {% if mes == '09' %}selected{% endif %}>
                                        Setembro
                                    </option>

                                    <option value="10" {% if mes == '10' %}selected{% endif %}>
                                        Outubro
                                    </option>

                                    <option value="11" {% if mes == '11' %}selected{% endif %}>
                                        Novembro
                                    </option>

                                    <option value="12" {% if mes == '12' %}selected{% endif %}>
                                        Dezembro
                                    </option>

                                </select>


                        <select
                            name="site"
                            class="form-select filtro-select"
                            onchange="this.form.submit()"
                        >

                            <option value="">
                                Todos os sites
                            </option>

                            {% for item in lista_sites %}

                            <option
                                value="{{ item }}"
                                {% if site == item %}selected{% endif %}
                            >
                                {{ item }}
                            </option>

                            {% endfor %}

                        </select>

                        <select
                            name="desvio"
                            class="form-select filtro-select"
                            onchange="this.form.submit()"
                        >

                            <option value="">
                                Todos os desvios
                            </option>

                            {% for erro in lista_desvios %}

                            <option
                                value="{{ erro }}"
                                {% if desvio == erro %}selected{% endif %}
                            >
                                {{ erro }}
                            </option>

                            {% endfor %}

                        </select>

                    </form>

                    <div class="table-container">

                        <table class="table table-hover align-middle">

                            <thead>

                                <tr>

                                    <th>Data</th>

                                    <th>Site</th>

                                    <th>Número</th>

                                    <th>Origem</th>

                                    <th>Etapa</th>

                                    <th>Área</th>

                                    <th>Desvio</th>

                                    <th>Motivo</th>

                                </tr>

                            </thead>

                            <tbody>

                                {% for item in dados %}

                                <tr>

                                    <td>{{ item[0] }}</td>

                                    <td>{{ item[1] }}</td>

                                    <td>{{ item[2] }}</td>

                                    <td>{{ item[3] }}</td>

                                    <td>{{ item[4] }}</td>

                                    <td>{{ item[5] }}</td>

                                    <td>{{ item[6] }}</td>

                                    <td>{{ item[7] }}</td>

                                </tr>

                                {% endfor %}

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

            <div class="col-lg-4">

                <div class="graficos-container">

                    <div class="card-custom grafico-box">

                        <h3 class="title text-center mb-3">
                            Distribuição de Erros
                        </h3>

                        <canvas id="graficoErros"></canvas>

                    </div>

                    <div class="card-custom grafico-box">

                        <h3 class="title text-center mb-3">
                            Áreas
                        </h3>

                        <canvas id="graficoAreas"></canvas>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        new Chart(
            document.getElementById('graficoErros'),
            {
                type: '{{ grafico_erros }}',

                data: {

                    labels: {{ labels | tojson }},

                    datasets: [{

                        data: {{ valores | tojson }},

                        borderWidth: 1

                    }]
                },

                options: {

                    responsive: true,

                    maintainAspectRatio: false,

                    plugins: {

                        legend: {

                            labels: {

                                color: '#ffffff'
                            }
                        }
                    }
                }
            }
        );

        new Chart(
            document.getElementById('graficoAreas'),
            {
                type: '{{ grafico_areas }}',

                data: {

                    labels: {{ labels_area | tojson }},

                    datasets: [{

                        data: {{ valores_area_percentual | tojson }},

                        borderWidth: 1

                    }]
                },

                options: {

                    responsive: true,

                    maintainAspectRatio: false,

                    plugins: {

                        legend: {

                            labels: {

                                color: '#ffffff'
                            }
                        }
                    }
                }
            }
        );

    </script>

</body>

</html>
